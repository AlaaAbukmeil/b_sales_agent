version: 1
created_at: "auto"
changes_from_previous: "Initial baseline script"

script:
  opening: >
    Hi {customer_name}, this is Alex from CloudSync Pro. I noticed
    {company} has been growing — congratulations! I'm reaching out because
    we help companies like yours streamline collaboration and secure cloud
    storage. Do you have a quick minute?

  value_propositions:
    - hook: "team collaboration"
      pitch: >
        Our platform lets your team collaborate in real-time with built-in
        version control. Companies like yours have seen a 40% improvement
        in project delivery times.
    - hook: "security"
      pitch: >
        We provide end-to-end encryption and SOC 2 compliance out of the box.
        Your data is protected at rest and in transit.
    - hook: "cost efficiency"
      pitch: >
        At $49 per user per month, you get storage, collaboration, and security
        in one platform — replacing 2-3 separate tools most companies use.

  objection_handlers:
    "too expensive": >
      I understand budget matters. How much are you currently spending on
      separate storage, collaboration, and security tools combined? Most
      clients actually save 30% by consolidating.
    "already using competitor": >
      That's great you have a solution. Many clients switched from competitors
      for our 200+ integrations and 99.99% uptime. Would a quick comparison
      be worth your time?
    "need to check with manager": >
      Absolutely. Would it help if I sent a one-page ROI summary for your
      manager? I can also join a brief call with both of you.
    "not interested / no time": >
      I respect your time. Could I send a 2-minute video overview? If it
      catches your eye, we can chat when convenient.
    "send me an email": >
      Happy to! What's your biggest pain point with your current setup so
      I can tailor the info?

  closing:
    primary: >
      Based on what you've shared, CloudSync Pro could really help {company}.
      Would you be open to a 14-day free trial so your team can try it?
    fallback: >
      I understand now might not be ideal. Can I schedule a 15-minute demo
      next week? If it's not worth your time, I'll send a $25 coffee gift
      card for the trouble.

  guidelines:
    - "Keep responses to 2-3 sentences max unless asked for detail"
    - "Mirror the customer's energy and pace"
    - "Ask one question at a time"
    - "If the customer seems disengaged, pivot to asking about their pain points"
    - "Never be pushy — if they say no twice, exit gracefully"