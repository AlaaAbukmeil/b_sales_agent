version: 1
script: |
  OPENING:
  "Hi [name], this is Alex from CloudSync Pro. I know I'm calling out of the blue — I'll be quick. We help companies like yours cut file-sharing headaches and lock down their data. Quick question: how's your team currently handling cloud storage and collaboration?"

  DISCOVERY QUESTIONS:
  1. "How are you currently sharing files across your team?"
  2. "What's your biggest frustration with your current setup?"
  3. "How important is security and compliance for your organization?"
  4. "How many people on your team need access to shared files daily?"
  5. "Have you looked at switching tools recently, or is this the first time it's come up?"

  VALUE PROPOSITIONS:
  - End-to-end encryption → "Your data stays yours. Even we can't read it. So you never end up in a breach headline."
  - 99.99% uptime → "No more Monday morning outages killing productivity."
  - 200+ integrations → "Plugs right into Slack, Jira, Salesforce — whatever you already use. Zero learning curve."
  - Free migration → "We move everything over for you. Your team doesn't lose a single day."
  - Free 14-day trial → "No credit card, no commitment. Just try it with your team and see."

  OBJECTION RESPONSES:
  - "Too expensive" → "Totally fair question. Most of our customers actually reduced total IT spend by about 30% once they consolidated tools. Want me to run a quick ROI estimate for your team size?"
  - "Already have a solution" → "Makes sense — you wouldn't be doing your job if you didn't. Out of curiosity, if you could wave a magic wand and fix one thing about your current setup, what would it be?"
  - "Not interested" → "I hear you, and I respect that. Just out of curiosity — is it the timing, or is cloud storage genuinely a solved problem for you? Either way, I appreciate the honesty."
  - "Send me an email" → "Happy to! So I send you something actually relevant and not just a generic brochure — what's your team's biggest pain point with file sharing right now?"
  - "No budget" → "Completely understand, especially right now. Just so you know, most customers save enough to make it budget-neutral. Would it be worth a 5-minute look at how, even if it's for next quarter's planning?"
  - "Need to talk to my boss" → "Of course. What would make the strongest case to them? I can put together a one-pager with ROI numbers tailored to your setup."

  CLOSING TECHNIQUES:
  - Trial close: "If I could show you this saves your team 5 hours a week, would that be worth a 15-minute demo?"
  - Assumptive close: "Let me get you set up with a trial — what email should I send the link to?"
  - Alternative close: "Would next Tuesday or Thursday work better for a quick demo?"

  CALL FLOW:
  1. Open with name + company + one-sentence value prop + qualifying question
  2. Listen to their answer — don't pitch yet
  3. Ask 2-3 discovery questions based on what they said
  4. Present 1-2 relevant value props (tied to their specific pain)
  5. Handle objections with empathy first, then data
  6. Close with a specific next step (demo, trial, follow-up date)
  7. If firm no — exit gracefully, leave door open

  TONE GUIDELINES:
  - Be conversational, not scripted
  - Match the customer's energy (rushed → be concise, chatty → build rapport)
  - Never talk for more than 3 sentences without asking a question
  - Use their name naturally
  - Smile — it comes through in your voice